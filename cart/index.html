<style>
.letter-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -10%);
  z-index: 100;
  width: 400px;
  opacity: 0;
  animation: fadeInLetter 1s 4s forwards;
}
letter-container:has(.letter.opened) {
  z-index: 20001;
}

@keyframes fadeInLetter {
  0% {
    opacity: 0;
    transform: translate(-50%, -10%) scale(0.8);
  }
  100% {
    opacity: 1;
    transform: translate(-50%, -10%) scale(1);
  }
}

:root {
  --bg-envelope-color: #f3d6df;
  --heart-color: #f38cb4;
  --envelope-tab: #f7bfd1;
  --envelope-cover: #efadc4;
  --shadow-color: rgba(52, 28, 48, 0.22);
  --txt-color: #4a3951;
  --paper-bg: #fff9f5;
  --paper-bg-top: #fffaf7;
  --paper-bg-bottom: #fbe9f1;
  --paper-panel-top: rgba(255, 248, 251, 0.88);
  --paper-panel-middle: rgba(250, 229, 239, 0.56);
  --paper-panel-bottom: rgba(238, 188, 212, 0.16);
  --paper-panel-accent: rgba(194, 225, 210, 0.16);
  --paper-edge: rgba(239, 189, 213, 0.32);
  --paper-border: rgba(111, 84, 101, 0.42);
  --paper-dot-border: rgba(232, 197, 107, 0.82);
  --paper-glow: rgba(173, 215, 194, 0.34);
  --letter-message-color: #52624f;
  --letter-title-color: #c85b87;
  --letter-title-gradient: linear-gradient(90deg, #fff8f0 0%, #ffc7dd 34%, #e98fb2 64%, #b8dfca 100%);
  --signature-color: #8f5e76;
  --page-background-solid: #f8ebef;
  --page-background: linear-gradient(180deg, #6f485f 0%, #6a617a 48%, #5b8572 100%);
  --page-background-overlay: radial-gradient(circle at top, rgba(255, 183, 212, 0.16) 0%, rgba(255, 183, 212, 0) 38%);
  --overlay-bg: linear-gradient(135deg, rgba(99, 49, 78, 0.94), rgba(54, 95, 83, 0.9));
  --overlay-text-color: #ffffff;
  --overlay-accent: rgba(255, 221, 232, 0.96);
  --overlay-title-gradient: linear-gradient(180deg, #fffaf7 0%, #ffdbe8 42%, #c9ead8 100%);
  --overlay-title-shadow: rgba(170, 104, 146, 0.28);
  --overlay-glow-soft: rgba(255, 212, 227, 0.42);
  --overlay-glow-mid: rgba(233, 146, 190, 0.34);
  --overlay-glow-strong: rgba(201, 234, 216, 0.26);
  --site-title-color: #fffafc;
  --site-title-gradient: linear-gradient(180deg, #fffaf7 0%, #ffd3e3 44%, #b6ddc9 100%);
  --site-title-shadow: 0 0 10px rgba(255, 214, 228, 0.32), 0 0 22px rgba(178, 109, 150, 0.2);
  --theme-title-shadow: rgba(157, 98, 135, 0.32);
  --overlay-heart-filter: hue-rotate(-12deg) saturate(1.08) brightness(1.03);
  --control-bg: rgba(255, 255, 255, 0.16);
  --control-border: rgba(255, 255, 255, 0.32);
  --control-text: #ffffff;
  --star-color: rgba(255, 238, 245, 0.86);
  --star-glow: rgba(255, 214, 228, 0.52);
  --moon-color: #fff2f7;
  --moon-glow: rgba(255, 221, 235, 0.44);
  --shooting-star-color: #fff2f8;
  --shooting-star-tail: rgba(255, 225, 237, 0.96);
  --petal-highlight: #ffe7f2;
  --petal-mid: #f3b3d1;
  --petal-deep: #ca6d9d;
  --petal-shadow: #8d4d71;
  --petal-core: #4c2d49;
  --petal-border: #9d6281;
  --petal-glow: #ecbad4;
  --petal-shine: #ffe4f0;
  --petal-inner-shadow: rgba(116, 61, 91, 0.42);
  --petal-inner-highlight: #fff1f8;
  --petal-border-inner: #b17393;
  --petal-center-start: #7c4862;
  --petal-center-end: #2b1b2b;
  --petal-center-glow: rgba(228, 170, 199, 0.48);
  --stem-dark: #517540;
  --stem-mid: #78a85e;
  --stem-light: #b5d78f;
  --stem-shadow: rgba(48, 35, 25, 0.28);
  --stem-highlight: rgba(255, 255, 255, 0.18);
  --grass-color: #78a85d;
  --grass-overlay: rgba(63, 88, 68, 0.16);
  --bouquet-backdrop: radial-gradient(circle at center, rgba(255, 185, 214, 0.3) 0%, rgba(201, 231, 209, 0.2) 42%, rgba(91, 122, 108, 0) 76%);
  --wrapper-filter: hue-rotate(-8deg) saturate(1.02) brightness(1.03);
  --photo-shadow: drop-shadow(0 26px 28px rgba(15, 9, 33, 0.2)) drop-shadow(0 10px 14px rgba(15, 9, 33, 0.14));
}

body {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 100vh;
  overflow: hidden;
  background: var(--page-background-solid);
  background-image: var(--page-background-overlay), var(--page-background);
  color: var(--txt-color);
  transition: background 0.35s ease, color 0.35s ease;
}

html {
  overflow: hidden;
  background: #39564f;
  background-image: none;
  background-repeat: no-repeat;
  background-size: 100% 100%;
}

@supports (height: 100dvh) {
  body {
    height: 100dvh;
    min-height: 100dvh;
  }
}

body::before {
  background-image:
    radial-gradient(2px 2px at 20px 30px, var(--star-color), transparent),
    radial-gradient(2px 2px at 40px 70px, var(--star-color), transparent),
    radial-gradient(1px 1px at 90px 40px, var(--star-color), transparent),
    radial-gradient(1px 1px at 130px 80px, var(--star-color), transparent),
    radial-gradient(2px 2px at 160px 30px, var(--star-color), transparent);
  opacity: 0.34;
}

body::after {
  background: var(--moon-color);
  box-shadow:
    0 0 12px var(--moon-color),
    0 0 24px var(--moon-glow),
    inset -10px -5px 0 rgba(255, 255, 255, 0.14);
  opacity: 0.78;
}

.shooting-star {
  background: var(--shooting-star-color);
  box-shadow: 0 0 6px 2px var(--star-glow);
}

.shooting-star::before {
  background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, var(--shooting-star-tail) 100%);
}

@keyframes glowPulse {
  0%, 10% {
    text-shadow: 
      1px 1px 0 white, 
      -1px -1px 0 white,  
      1px -1px 0 white,  
      -1px 1px 0 white,
      0 0 1px #000,     
      0 0 5px #000,  
      0 0 10px #000, 
      0 0 15px #000,    
      0 0 20px #000;
  }
  50% {
    text-shadow: 
      1px 1px 0 white, 
      -1px -1px 0 white,  
      1px -1px 0 white,  
      -1px 1px 0 white,
      0 0 2px #000,     
      0 0 8px #000,  
      0 0 15px #000, 
      0 0 35px #ff2e6d,
      0 0 45px #fe3672;
  }
}

.letter-title {
  font-family: 'Tangerine', cursive;
  color: var(--site-title-color);
  font-size: 100px;
  text-align: center;
  margin: 20px 0;
  text-shadow: var(--site-title-shadow);
  animation: glowPulse 2.5s ease-in-out infinite;
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 40;
}

.envelope-wrapper {
  box-shadow: 0 0 25px rgba(0, 0, 0, 0.2);
  position: relative;
  background-color: var(--bg-envelope-color);
  box-shadow: 0 0 40px var(--shadow-color), 0 24px 48px rgba(0, 0, 0, 0.12);
  border-radius: 15px;
}

.envelope-wrapper > .envelope {
  position: relative;
  width: 400px;
  height: 300px;
}

.envelope-wrapper > .envelope::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 4;
  border-top: 180px solid var(--envelope-tab);
  border-right: 200px solid transparent;
  border-left: 200px solid transparent;
  transform-origin: top;
  transition: all 0.5s ease-in-out 0.7s;
  border-radius: 10px;
}

.tap-right {
  position: absolute;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;
  clip-path: polygon(100% 0, 0 100%, 100% 100%);
  transform: rotate(-90deg,90deg);
  border-bottom-right-radius: 10px;
  border-top-right-radius: 10px;
  border-bottom-left-radius: 10px;
  background-color: var(--envelope-cover);
}

.tap-left {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  clip-path: polygon(0 0, 0% 100%, 100% 100%);
  background-color: var(--envelope-cover);
  transform: rotate(90deg, -90deg);
  border-top-left-radius: 10px;
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 10px;
}

.envelope > .letter {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(165deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0) 32%),
    linear-gradient(180deg, var(--paper-bg-top) 0%, var(--paper-bg) 48%, var(--paper-bg-bottom) 100%);
  text-align: center;
  box-shadow: 0 0 5px var(--shadow-color), inset 0 0 0 1px var(--paper-edge);
  padding: 15px;
  border-radius: 10px;
  transition: transform 0.5s ease-in-out;
}

.envelope > .letter > .text {
  font-family: 'Caveat', 'Segoe Script', 'Bradley Hand', cursive;
  color: var(--letter-message-color);
  text-align: left;
  font-size: 24px;
  position: relative;
  border: 3px dotted var(--paper-dot-border);
  border-radius: 18px;
  background:
    radial-gradient(circle at 14% 8%, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0) 34%),
    radial-gradient(circle at 94% 0%, var(--paper-panel-accent) 0%, rgba(255, 255, 255, 0) 36%),
    linear-gradient(180deg, var(--paper-panel-top) 0%, var(--paper-panel-middle) 50%, var(--paper-panel-bottom) 100%);
  background-clip: padding-box;
  padding: 14px;
  height: 100%;
  line-height: 1.58;
  cursor: pointer;
  overflow: scroll;
  overflow-x: hidden;
  overflow-y: auto;
  word-wrap: break-word;
  overflow-wrap: break-word;
  hyphens: auto;
  white-space: pre-wrap;
  letter-spacing: 0.01em;
  max-width: 100%;
  box-sizing: border-box;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.46),
    0 10px 26px rgba(27, 19, 33, 0.08);
  backdrop-filter: blur(3px);
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.28);
}

.envelope > .letter > .text p {
  margin: 0 0 0.4rem;
}

.envelope > .letter > .text p:last-child {
  margin-bottom: 0;
}

.envelope > .letter > .text > p {
  display: none;
}

.hidden {
  display: none !important;
}

.letter-content {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.letter-card-title {
  margin: 0;
  width: 100%;
  text-align: center;
  color: var(--letter-title-color);
  background: none;
  -webkit-text-fill-color: currentColor;
  font-family: "Cormorant Garamond", "Times New Roman", serif;
  letter-spacing: 0.03em;
  font-size: 1.32em;
  line-height: 1.12;
  font-weight: 700;
  filter: drop-shadow(0 3px 8px var(--theme-title-shadow));
}

.letter-photo-wrap {
  width: 100%;
}

.letter-photo-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  display: grid;
  place-items: center;
  overflow: visible;
  padding: 0;
  background: transparent;
  border: 0;
  border-radius: 0;
  box-shadow: none;
  perspective: 1200px;
}

.letter-photo-frame::before {
  content: none;
}

.letter-photo {
  position: relative;
  width: 94%;
  height: 94%;
  display: block;
  object-fit: cover;
  object-position: center;
  border-radius: 12px;
  background: transparent;
  box-shadow:
    0 18px 24px rgba(27, 19, 33, 0.18),
    0 7px 12px rgba(27, 19, 33, 0.12);
  filter: var(--photo-shadow) saturate(1.03);
  transform: rotateX(4deg) rotateY(-7deg) rotateZ(-1.5deg) translateZ(0);
  transform-origin: center top;
}

.letter-card-message {
  margin: 0;
  width: 100%;
  color: var(--letter-message-color);
  white-space: pre-wrap;
  line-height: 1.55;
  font-weight: 600;
}

.letter-card-signature {
  margin: auto 0 0;
  width: 100%;
  text-align: right;
  color: var(--signature-color);
  font-weight: 700;
}

.overlay-content p {
  max-width: 560px;
  margin: 0 auto 34px;
  color: rgba(255, 255, 255, 0.86);
  font-size: clamp(0.95rem, 1.8vw, 1.15rem);
  line-height: 1.65;
}

.music-control.hidden {
  display: none !important;
}

.preview-return {
  position: fixed;
  top: 22px;
  left: 22px;
  z-index: 20050;
  border: 0;
  border-radius: 999px;
  padding: 12px 18px;
  background: var(--control-bg);
  color: var(--control-text);
  border: 1px solid var(--control-border);
  font: inherit;
  font-weight: 700;
  backdrop-filter: blur(12px);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
  cursor: pointer;
}

.floating-hearts {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 45;
}

.floating-heart {
  position: absolute;
  width: 25px;
  height: 25px;
  background: var(--heart-color);
  transform: rotate(45deg);
  opacity: 0.7;
  animation: float 8s infinite linear;
  transition: transform 0.3s ease-in-out, opacity 0.3s ease;
}

.floating-heart:hover {
  transform: rotate(45deg) scale(1.5);
  opacity: 1;
}

.floating-heart::before,
.floating-heart::after {
  content: '';
  position: absolute;
  width: 25px;
  height: 25px;
  background: var(--heart-color);
  border-radius: 50%;
}

.floating-heart::before {
  top: -15px;
  left: 0;
}

.floating-heart::after {
  top: 0;
  left: -15px;
}

@keyframes float {
  0% {
    transform: translateY(100vh) rotate(45deg) scale(0);
    opacity: 0;
  }
  10% {
    opacity: 0.7;
    transform: translateY(90vh) rotate(45deg) scale(1);
  }
  90% {
    opacity: 0.7;
    transform: translateY(-10vh) rotate(45deg) scale(1);
  }
  100% {
    transform: translateY(-20vh) rotate(45deg) scale(0);
    opacity: 0;
  }
}

@keyframes heartbeat {
  0%, 100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
  50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.1); }
}

.heart {
  animation: heartbeat 2s ease-in-out infinite;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30px;
  height: 30px;
  background: var(--heart-color);
  transform: translate(-50%, 0%) rotate(45deg) !important;
  transition: transform 0.5s ease-in-out 1s;
  box-shadow: 0 1px 6px var(--shadow-color);
  cursor: pointer;
  z-index: 999;
}

.heart:before,
.heart:after {
  content: "";
  position: absolute;
  width: 30px;
  height: 30px;
  background-color: var(--heart-color);
  border-radius: 80%;
}

.heart:before {
  top: -15px;
}

.heart:after {
  right: 15px;
}

.flap > .envelope:before {
  transform: rotateX(180deg);
  z-index: 0;
}

.flap > .heart {
  transform: rotate(180deg);
  transition-delay: 0.4s;
}

.letter.letter-opening {
  transform: translateY(-290px) scale(1);
  animation-delay: 0.5s;
  transition: transform 0.5s ease-in-out;
}

.letter.closing-letter {
  transform: translateY(0) scale(1);
  transition: transform 0.5s ease-in-out;
  z-index: 10000;
}

.letter.opened {
  z-index: 20000;
  transform: translate(0%, -100%) scale(2);
}

body.letter-open .flowers,
body.letter-open .shooting-stars,
body.letter-open .shooting-star,
body.letter-open .morita-text,
body.letter-open .flower,
body.letter-open .growing-grass,
body.letter-open .grow-ans {
  animation-play-state: paused !important;
}

::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: transparent;
  border-radius: 4px;
}

::-webkit-scrollbar-thumb {
  background: var(--envelope-cover);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--heart-color);
}

@media (min-width: 1024px) {
  .letter-container {
    width: 384px;
    top: 50%;
  }
  .envelope-wrapper > .envelope {
    width: 384px;
    height: 288px;
  }
  .envelope-wrapper > .envelope::before {
    border-top: 173px solid var(--envelope-tab);
    border-right: 192px solid transparent;
    border-left: 192px solid transparent;
  }
  .envelope > .letter {
    padding: 14px;
  }
  .envelope > .letter > .text {
    font-size: 11.5px;
    line-height: 14px;
    border-width: 2.9px;
    padding: 10px;
    overflow-x: hidden;
    word-wrap: break-word;
  }
  .letter-content {
    gap: 8px;
  }
  .letter-card-title {
    font-size: 1.48em;
  }
  .letter-photo-frame {
    border-radius: 0;
  }
  .heart {
    width: 29px;
    height: 29px;
  }
  .heart:before,
  .heart:after {
    width: 29px;
    height: 29px;
  }
  .heart:before {
    top: -14px;
  }
  .heart:after {
    right: 14px;
  }
  .letter.letter-opening,
  .letter.closing-letter {
    transform: translateY(-278px) scale(1);
  }
  .letter.opened {
    transform: translate(0%, -70%) scale(2);
  }
  ::-webkit-scrollbar {
    width: 8px;
  }
}
@media (max-width: 768px) {
  .letter-container {
    width: 200px;
    top: 75%;
  }
  .envelope-wrapper > .envelope {
    width: 200px;
    height: 150px;
  }
  .envelope-wrapper > .envelope::before {
    border-top: 90px solid var(--envelope-tab);
    border-right: 100px solid transparent;
    border-left: 100px solid transparent;
  }
  .envelope > .letter {
    padding: 7px;
  }
  .envelope > .letter > .text {
    font-size: 10px;
    line-height: 13px;
    border-width: 1.5px;
    padding: 5px;
    overflow-x: hidden;
    overflow-y: auto;
    word-wrap: break-word;
    overflow-wrap: break-word;
    hyphens: auto;
    max-width: 100%;
    box-sizing: border-box;
    margin: 0;
  }
  .letter-content {
    gap: 7px;
  }
  .letter-card-title {
    font-size: 1.28em;
  }
  .letter-photo-frame {
    border-radius: 0;
  }
  .letter-photo {
    width: 92%;
    height: 92%;
    border-radius: 8px;
    box-shadow:
      0 9px 12px rgba(27, 19, 33, 0.16),
      0 4px 8px rgba(27, 19, 33, 0.1);
    transform: rotateX(3deg) rotateY(-5deg) rotateZ(-1deg) translateZ(0);
  }
  .heart {
    width: 15px;
    height: 15px;
  }
  .heart:before,
  .heart:after {
    width: 15px;
    height: 15px;
  }
  .heart:before {
    top: -7.5px;
  }
  .heart:after {
    right: 7.5px;
  }
  .letter.letter-opening,
  .letter.closing-letter {
    transform: translateY(-145px) scale(1);
  }
  .letter.opened {
    transform: translate(0%, -100%) scale(2);
  }
  ::-webkit-scrollbar {
    width: 4px;
  }
}

@media (max-width: 400px) {
  .letter-container {
    left: 45%;
    width: 160px;
    top: 75%;
  }
  .envelope-wrapper > .envelope {
    width: 160px;
    height: 120px;
  }
  .envelope-wrapper > .envelope::before {
    border-top: 72px solid var(--envelope-tab);
    border-right: 80px solid transparent;
    border-left: 80px solid transparent;
  }
  .envelope > .letter > .text {
    font-size: 7px;
    line-height: 10px;
    padding: 3px;
    overflow-x: hidden;
  }
  .letter-card-title {
    font-size: 1.2em;
  }
  .letter-photo-frame {
    border-radius: 0;
  }
  .letter-photo {
    width: 92%;
    height: 92%;
    border-radius: 6px;
  }
  .letter.letter-opening,
  .letter.closing-letter {
    transform: translateY(-116px) scale(1);
  }
  .letter.opened {
    transform: translate(0%, -150%) scale(2);
  }
}

#audio-overlay {
  position: absolute;
  inset: 0;
  width: auto;
  height: auto;
  min-height: 100%;
  background: linear-gradient(135deg, rgba(99, 49, 78, 0.94), #39564f);
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: opacity 0.8s ease;
}

@supports (height: 100dvh) {
  #audio-overlay {
    min-height: 100%;
  }
}

.overlay-content {
  text-align: center;
  color: var(--overlay-text-color);
  position: relative;
  padding: 80px 60px;
}

.overlay-content h2 {
  font-family: 'Caveat', cursive;
  font-size: clamp(2.8rem, 7vw, 6rem);
  margin-bottom: 34px;
  color: transparent;
  background-image: var(--overlay-title-gradient);
  background-size: 100% 100%;
  background-repeat: no-repeat;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: none;
  position: relative;
  animation: glow 2s ease-in-out infinite;
  filter: drop-shadow(0 8px 18px var(--overlay-title-shadow));
}

.overlay-content h2::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--overlay-accent), transparent);
  animation: expand 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% {
    text-shadow: 
      0 0 8px var(--overlay-glow-soft),
      0 0 18px var(--overlay-glow-mid);
  }
  50% {
    text-shadow:
      0 0 12px var(--overlay-glow-soft),
      0 0 24px var(--overlay-glow-mid),
      0 0 36px var(--overlay-glow-strong);
  }
}

@keyframes expand {
  0%, 100% { width: 100px; }
  50% { width: 200px; }
}

.overlay-image {
  max-width: 250px;
  width: 40vw;
  height: auto;
  animation: heartbeat1 1.2s ease-in-out infinite;
  filter: var(--overlay-heart-filter) drop-shadow(0 0 12px var(--overlay-glow-mid));
}

#audio-overlay .overlay-image {
  animation-play-state: running !important;
}

@keyframes heartbeat1 {
  0% {
    transform: scale(1);
    filter: var(--overlay-heart-filter) drop-shadow(0 0 5px var(--overlay-glow-mid));
  }
  50% {
    transform: scale(1.2);
    filter: var(--overlay-heart-filter) drop-shadow(0 0 10px var(--overlay-glow-soft));
  }
  100% {
    transform: scale(1);
    filter: var(--overlay-heart-filter) drop-shadow(0 0 5px var(--overlay-glow-mid));
  }
}

.morita-text {
  color: transparent !important;
  background-image: var(--site-title-gradient);
  background-size: 180% 100%;
  background-repeat: no-repeat;
  background-position: 0% 50%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  filter: drop-shadow(0 4px 10px var(--theme-title-shadow));
  transition: filter 0.35s ease;
  animation: siteTitleReveal 3.5s ease-out forwards, gradientShift 12s ease-in-out infinite alternate;
}

@keyframes siteTitleReveal {
  0% {
    opacity: 0;
    transform: translateX(-50%) scale(0.92);
    filter: drop-shadow(0 0 0 transparent);
  }
  35% {
    opacity: 0.2;
    transform: translateX(-50%) scale(1.02);
    filter: drop-shadow(0 4px 14px var(--theme-title-shadow));
  }
  100% {
    opacity: 1;
    transform: translateX(-50%) scale(1);
    filter: drop-shadow(0 4px 10px var(--theme-title-shadow));
  }
}

@keyframes gradientShift {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 100% 50%;
  }
}

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const audioOverlay = document.getElementById('audio-overlay');
      const backgroundMusic = document.getElementById('backgroundMusic');

      audioOverlay.addEventListener('click', () => {
        audioOverlay.style.opacity = '0';
        setTimeout(() => { 
          audioOverlay.style.display = 'none'; 
        }, 800);
        
        if (backgroundMusic && backgroundMusic.paused) {
          backgroundMusic.play().then(() => {
            console.log('Música tocando em:', backgroundMusic.currentTime);
            document.getElementById('playIcon').style.display = 'none';
            document.getElementById('pauseIcon').style.display = 'inline-block';
          }).catch(error => {
            console.error('Erro ao tocar áudio:', error.message);
          });
        }

        document.body.classList.remove('not-loaded');

        function createShootingStar() {
          const star = document.createElement('div');
          star.className = 'shooting-star';
          star.style.top = Math.random() * 60 + '%';
          star.style.left = '-10%';
          star.style.animationDelay = '0s';
          star.style.animationDuration = (Math.random() * 1.5 + 2) + 's';
          
          document.querySelector('.shooting-stars').appendChild(star);
          
          setTimeout(() => {
            star.remove();
          }, 4000);
        }

        const isMobile = window.innerWidth <= 768 || /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (isMobile) {
          setInterval(() => { 
            if (Math.random() > 0.7) { 
              createShootingStar();
            }
          }, Math.random() * 9000 + 5000);
        }
      });

      function setupMusicControls() {
        const music = document.getElementById("backgroundMusic");
        const musicBtn = document.getElementById("musicBtn");
        const playIcon = document.getElementById("playIcon");
        const pauseIcon = document.getElementById("pauseIcon");
        const volumeSlider = document.getElementById("volumeSlider");
        const volumeControl = document.getElementById("volumeControl");

        if (!music || !musicBtn || !volumeSlider || !volumeControl) {
          console.error('Elementos de música ou controles não encontrados');
          return;
        }

        music.volume = volumeSlider.value;
        playIcon.style.display = 'inline-block';
        pauseIcon.style.display = 'none';

        function toggleMusic() {
          if (music.paused) {
            music.play().then(() => {
              console.log('Música tocando em:', music.currentTime);
              playIcon.style.display = 'none';
              pauseIcon.style.display = 'inline-block';
            }).catch(error => {
              console.error('Erro ao tocar áudio:', error.message);
              playIcon.style.display = 'inline-block';
              pauseIcon.style.display = 'none';
            });
          } else {
            music.pause();
            console.log('Música pausada em:', music.currentTime);
            playIcon.style.display = 'inline-block';
            pauseIcon.style.display = 'none';
          }
        }

        musicBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleMusic();
          if (!volumeControl.classList.contains('visible')) {
            volumeControl.classList.add('visible');
            clearTimeout(hideVolumeTimeout);
            hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove('visible'), 2000);
          } else {
            volumeControl.classList.remove('visible');
          }
        });

        let hideVolumeTimeout = null;
        volumeSlider.addEventListener('input', (e) => {
          music.volume = e.target.value;
          console.log('Volume definido para:', music.volume);
          clearTimeout(hideVolumeTimeout);
          volumeControl.classList.add('visible');
        });

        volumeSlider.addEventListener('change', () => {
          hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove('visible'), 2000);
        });

        volumeControl.addEventListener('mouseenter', () => clearTimeout(hideVolumeTimeout));
        volumeControl.addEventListener('mouseleave', () => {
          hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove('visible'), 2000);
        });

        volumeSlider.addEventListener('touchstart', (e) => {
          e.stopPropagation();
          clearTimeout(hideVolumeTimeout);
        });
        volumeSlider.addEventListener('touchend', () => {
          hideVolumeTimeout = setTimeout(() => volumeControl.classList.remove('visible'), 2000);
        });

        document.addEventListener('click', (e) => {
          if (!volumeControl.contains(e.target) && !musicBtn.contains(e.target)) {
            volumeControl.classList.remove('visible');
            clearTimeout(hideVolumeTimeout);
          }
        });

        music.addEventListener('loadeddata', () => console.log('Dados do áudio carregados'));
        music.addEventListener('error', (e) => console.error('Erro de áudio:', e.message));
        music.addEventListener('play', () => console.log('Evento de tocar música'));
        music.addEventListener('pause', () => console.log('Evento de pausar música'));
      }

      setupMusicControls();

      (function keepMusicControlZIndex() {
        const mc = document.querySelector('.music-control');
        if (!mc) return;

        const overlay = document.getElementById('audio-overlay');
        if (overlay) {
          const ensureZ = () => {
            const oz = parseInt(window.getComputedStyle(overlay).zIndex || 0, 10) || 0;
            mc.style.zIndex = (oz - 1).toString();
          };
          ensureZ();

          const obs = new MutationObserver(ensureZ);
          obs.observe(overlay, { attributes: true, attributeFilter: ['style', 'class'] });

          window.addEventListener('beforeunload', () => obs.disconnect());
        }

        window.addEventListener('resize', () => {
          mc.style.position = 'fixed';
          mc.style.transform = 'none';
        });
      })();

      const envelope = document.querySelector('.envelope-wrapper');
      const letter = document.querySelector('.letter');
      let isAnimating = false;

      document.addEventListener('click', (e) => {
        if (isAnimating) return;

        if (
          e.target.matches(".envelope") || 
          e.target.matches(".tap-right") || 
          e.target.matches(".tap-left") || 
          e.target.matches(".heart")
        ) {
          if (!letter.classList.contains('opened')) {
            envelope.classList.add('flap');
            isAnimating = true;

            setTimeout(() => {
              letter.classList.add('letter-opening');

              setTimeout(() => {
                letter.classList.remove('letter-opening');
                letter.classList.add('opened');
                document.body.classList.add('letter-open');
                isAnimating = false;
              }, 500);
            }, 1000);
          }
        } else if (e.target.matches(".envelope *")) {
          if (letter.classList.contains("opened")) {
            document.body.classList.remove('letter-open');
            envelope.classList.remove('flap');
            isAnimating = true;

            setTimeout(() => {
              letter.classList.add("closing-letter");
            }, 500);

            setTimeout(() => {
              letter.classList.remove("closing-letter");
              letter.classList.remove("opened");
              isAnimating = false;
            }, 1000);
          }
        }
      });
    });
  </script>

      };

      function safeDecode(value) {
        try {
          return decodeURIComponent(value);
        } catch {
          return value;
        }
      }

      function decodeDataPayload(value) {
        if (!value) return null;

        try {
          const normalized = value.replace(/-/g, "+").replace(/_/g, "/");
          const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
          const binary = atob(padded);
          const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
          return JSON.parse(new TextDecoder().decode(bytes));
        } catch {
          return null;
        }
      }

      function normalizeTheme(value) {
        const normalized = (value || "").trim().toLowerCase();
        const aliases = {
          primavera: "primavera",
          verao: "verao",
          "verão": "verao",
          outono: "outono",
          inverno: "inverno",
          "cartas-estrelas": "inverno",
          "cartas entre estrelas": "inverno"
        };
        const resolved = aliases[normalized] || DEFAULT_THEME;
        return THEME_STYLES[resolved] ? resolved : DEFAULT_THEME;
      }

      function parseIncomingConfig() {
        let params = new URLSearchParams(location.search);
        const hashGift = location.hash.startsWith("#gift?");

        if (!params.toString() && hashGift) {
          params = new URLSearchParams(location.hash.replace("#gift?", ""));
        }

        const payload = decodeDataPayload(params.get("d") || "");
        if (payload) {
          return {
            openText: payload.openText || DEFAULTS.openText,
            recipient: payload.recipient || DEFAULTS.recipient,
            message: payload.message || DEFAULTS.message,
            sender: payload.sender || DEFAULTS.sender,
            accent: payload.accent || DEFAULTS.accent,
            music: payload.music || DEFAULTS.music,
            photo: payload.photo || DEFAULTS.photo,
            theme: normalizeTheme(payload.theme || DEFAULTS.theme),
            preview: params.get("preview") === "1",
            returnUrl: safeDecode(params.get("returnUrl") || "")
          };
        }

        return {
          openText: safeDecode(params.get("openText") || DEFAULTS.openText),
          recipient: safeDecode(params.get("recipient") || DEFAULTS.recipient),
          message: safeDecode(params.get("message") || DEFAULTS.message),
          sender: safeDecode(params.get("sender") || DEFAULTS.sender),
          accent: safeDecode(params.get("accent") || DEFAULTS.accent),
          music: safeDecode(params.get("music") || DEFAULTS.music),
          photo: safeDecode(params.get("photo") || DEFAULTS.photo),
          theme: normalizeTheme(safeDecode(params.get("theme") || DEFAULTS.theme)),
          preview: params.get("preview") === "1",
          returnUrl: safeDecode(params.get("returnUrl") || "")
        };
      }

      function resolveMusicSource(value) {
        if (!value) return "";
        if (/^(https?:|data:|blob:|file:)/i.test(value)) return value;
        if (value.startsWith("../") || value.startsWith("./") || value.startsWith("/")) return value;
        if (value.startsWith("musica/")) return `../${value}`;
        return value;
      }

      function resolvePhotoSource(value) {
        if (!value) return "";
        if (/^(https?:|data:|blob:|file:)/i.test(value)) return value;
        if (value.startsWith("../") || value.startsWith("./") || value.startsWith("/")) return value;
        if (value.startsWith("imagens/")) return `../${value}`;
        return value;
      }

      function applyTheme(theme) {
        const resolvedTheme = normalizeTheme(theme);
        const themeStyles = THEME_STYLES[resolvedTheme];
        document.documentElement.dataset.theme = resolvedTheme;

        Object.entries(themeStyles).forEach(([property, value]) => {
          document.documentElement.style.setProperty(property, value);
        });

        return resolvedTheme;
      }

      function applyConfig(config) {
        const siteHeading = document.getElementById("siteHeading");
        const letterTitle = document.getElementById("letterCardTitle");
        const letterMessage = document.getElementById("letterCardMessage");
        const letterSignature = document.getElementById("letterCardSignature");
        const letterPhotoWrap = document.getElementById("letterPhotoWrap");
        const letterPhoto = document.getElementById("letterPhoto");
        const backgroundMusic = document.getElementById("backgroundMusic");
        const musicControl = document.querySelector(".music-control");
        const visibleTitle = config.openText || DEFAULTS.openText;
        const visibleLetterTitle = config.recipient || DEFAULTS.recipient;
        const visibleMessage = config.message || DEFAULTS.message;
        const visibleSignature = config.sender || DEFAULTS.sender;
        const resolvedMusic = resolveMusicSource(config.music);
        applyTheme(config.theme);

        if (siteHeading) siteHeading.textContent = visibleTitle;
        if (letterTitle) letterTitle.textContent = visibleLetterTitle;
        if (letterMessage) letterMessage.textContent = visibleMessage;

        if (letterSignature) {
          letterSignature.textContent = visibleSignature;
          letterSignature.classList.toggle("hidden", !visibleSignature);
        }

        if (letterPhotoWrap && letterPhoto) {
          if (config.photo) {
            letterPhoto.src = resolvePhotoSource(config.photo);
            letterPhoto.alt = `Foto da carta ${visibleLetterTitle}`;
            letterPhotoWrap.classList.remove("hidden");
          } else {
            letterPhoto.removeAttribute("src");
            letterPhotoWrap.classList.add("hidden");
          }
        }

        if (backgroundMusic) {
          if (resolvedMusic) {
            backgroundMusic.src = resolvedMusic;
          } else {
            backgroundMusic.removeAttribute("src");
          }
          backgroundMusic.load();
        }

        if (musicControl) {
          musicControl.classList.toggle("hidden", !resolvedMusic);
        }
      }

      function setupPreviewReturn(config) {
        const previewReturnBtn = document.getElementById("previewReturnBtn");

        if (!previewReturnBtn || !config.preview || !config.returnUrl) {
          return;
        }

        previewReturnBtn.classList.remove("hidden");
        history.pushState({ previewLock: true }, "", location.href);
        window.addEventListener("popstate", () => {
          history.pushState({ previewLock: true }, "", location.href);
        });

        previewReturnBtn.addEventListener("click", () => {
          location.replace(config.returnUrl);
        });
      }

      const config = parseIncomingConfig();
      applyConfig(config);
      setupPreviewReturn(config);
    })();
  </script>

            e.preventDefault();
        }
    });
